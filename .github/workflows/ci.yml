name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: timescale/timescaledb-ha:pg16
        env:
          POSTGRES_DB: agentic_capital
          POSTGRES_USER: agent
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agent -d agentic_capital"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src/ tests/

      - name: Format check (ruff)
        run: ruff format --check src/ tests/

      - name: Type check (mypy)
        run: mypy src/

      - name: Unit tests
        run: pytest tests/unit -v --tb=short --cov=src/agentic_capital --cov-report=term-missing -m "not integration and not e2e"

      - name: Integration tests
        env:
          DATABASE_URL: postgresql+asyncpg://agent:test_password@localhost:5432/agentic_capital
          REDIS_URL: redis://localhost:6379/0
        run: pytest tests/integration -v --tb=short -m integration
